<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velaris Vault</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia,serif;}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0f18;color:white;}

canvas{
position:fixed;
top:0;left:0;width:100%;height:100%;
z-index:0;
}

/* Screens */
.screen{
position:absolute;
top:0;left:0;width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
opacity:0;
pointer-events:none;
transition:opacity .6s ease, backdrop-filter .6s ease;
z-index:2;
}

.screen.active{
opacity:1;
pointer-events:auto;
}

/* Card */
.card{
width:90%;
max-width:420px;
padding:45px 35px;
border-radius:22px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,0.05);
border:1px solid rgba(224,180,92,0.5);
box-shadow:0 0 60px rgba(224,180,92,0.1);
text-align:center;
transition:.6s ease;
animation:floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
0%{transform:translateY(0)}
50%{transform:translateY(-6px)}
100%{transform:translateY(0)}
}

h1{
margin-bottom:25px;
font-size:clamp(20px,4vw,28px);
color:#e0b45c;
letter-spacing:2px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid rgba(224,180,92,0.7);
background:transparent;
color:white;
outline:none;
font-size:18px;
letter-spacing:6px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 25px;
border-radius:8px;
border:1px solid rgba(224,180,92,.6);
background:transparent;
color:#e0b45c;
font-weight:bold;
cursor:pointer;
transition:.3s ease;
}

button:hover{
box-shadow:0 0 20px rgba(224,180,92,.4);
transform:translateY(-2px);
}

.error{margin-top:15px;font-size:14px;height:18px;}

@keyframes shake{
0%{transform:translateX(0)}
20%{transform:translateX(-5px)}
40%{transform:translateX(5px)}
60%{transform:translateX(-4px)}
80%{transform:translateX(4px)}
100%{transform:translateX(0)}
}

.shake{animation:shake .35s ease;}

/* Vault */
#vaultText{
font-size:clamp(16px,3vw,22px);
line-height:1.6;
text-align:center;
margin-bottom:40px;
}

/* Contact Button */
.contact-btn{
opacity:0;
transform:translateY(10px);
transition:.5s ease;
}

.contact-btn.visible{
opacity:1;
transform:translateY(0);
}

/* Intruder */
#intruder{
background:url("baby.jpg") center/cover no-repeat;
}

#intruder::after{
content:"";
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,.55);
}

.intruder-text{
position:relative;
width:90%;margin:auto;text-align:center;
font-size:clamp(34px,7vw,72px);
font-weight:900;
letter-spacing:4px;
color:#f2f4f8;
text-transform:uppercase;
text-shadow:
0 0 6px rgba(255,255,255,.5),
0 0 18px rgba(180,200,255,.25);
animation:royalPulse 6s ease-in-out infinite;
}

@keyframes royalPulse{
0%{opacity:.85}
50%{opacity:1}
100%{opacity:.85}
}

/* Cursor */
.custom-cursor,.cursor-ring{
position:fixed;
pointer-events:none;
z-index:10;
transform:translate(-50%,-50%);
}

.custom-cursor{
width:8px;height:8px;
background:#e0b45c;
border-radius:50%;
box-shadow:0 0 10px rgba(224,180,92,.8);
}

.cursor-ring{
width:28px;height:28px;
border:1px solid rgba(224,180,92,.4);
border-radius:50%;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="lock" class="screen active">
<div class="card" id="card">
<h1>PRIVATE ACCESS</h1>
<input type="password" id="pass" placeholder="ENTER PASSWORD">
<button onclick="check()">ENTER</button>
<div class="error" id="err"></div>
</div>
</div>

<div id="vault" class="screen">
<div class="card">
<p id="vaultText"></p>
<button class="contact-btn" id="contactBtn"
onclick="window.open('https://instagram.com/why_ishy','_blank')">
INITIATE CONTACT
</button>
</div>
</div>

<div id="intruder" class="screen">
<div class="intruder-text">THIS PAGE IS NOT FOR YOU</div>
</div>

<div class="custom-cursor"></div>
<div class="cursor-ring"></div>

<script>

/* Reset */
window.onload=()=>activate("lock");

function activate(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* Particles */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener("resize",resize);

const particles=[];
for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+0.5,
speedX:(Math.random()-0.5)*0.25,
speedY:(Math.random()-0.5)*0.25,
opacity:Math.random()*0.5+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach(p=>{
p.x+=p.speedX;p.y+=p.speedY;
if(p.x<0||p.x>canvas.width)p.speedX*=-1;
if(p.y<0||p.y>canvas.height)p.speedY*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=`rgba(224,180,92,${p.opacity})`;
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

/* Cursor */
if(window.matchMedia("(pointer:fine)").matches){
document.body.style.cursor="none";
const c=document.querySelector(".custom-cursor");
const r=document.querySelector(".cursor-ring");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{
mx=e.clientX;my=e.clientY;
c.style.left=mx+"px";c.style.top=my+"px";
});
(function loop(){
rx+=(mx-rx)*0.1;ry+=(my-ry)*0.1;
r.style.left=rx+"px";r.style.top=ry+"px";
requestAnimationFrame(loop);
})();
}else{
document.querySelector(".custom-cursor").style.display="none";
document.querySelector(".cursor-ring").style.display="none";
}

/* System */
const correctPassword="gutka";
let attempts=0;

const nooo=new Audio("nooo.mp3");
const yaya=new Audio("yaya.mp3");
const glitch=new Audio("glitch.mp3");
const ambient=new Audio("ambient.mp3");
const typing=new Audio("typing.mp3");

ambient.loop=true;ambient.volume=0.15;
typing.loop=true;typing.volume=0.12;

function cinematicUnlock(){
const card=document.getElementById("card");
card.style.boxShadow="0 0 120px rgba(224,180,92,.6)";
card.style.transform="scale(1.03)";
setTimeout(()=>{
activate("vault");
startTyping();
},600);
}

function startTyping(){
const text="pani lekar aa 1 glass";
const el=document.getElementById("vaultText");
const btn=document.getElementById("contactBtn");
let i=0;
typing.play();
function type(){
if(i<text.length){
el.innerHTML+=text.charAt(i);
i++;
setTimeout(type,30+Math.random()*20);
}else{
typing.pause();
typing.currentTime=0;
btn.classList.add("visible");
}
}
type();
ambient.play();
}

function check(){
const val=document.getElementById("pass").value.trim();
const error=document.getElementById("err");
const card=document.getElementById("card");

if(val===""){
error.style.color="#e0b45c";
error.innerText="Password required";
return;
}

if(val===correctPassword){
error.innerText="";
yaya.play();
cinematicUnlock();
}else{
attempts++;
card.classList.add("shake");
setTimeout(()=>card.classList.remove("shake"),350);
nooo.play();
error.style.color="#ff4d4d";
error.innerText="Access denied";
if(attempts>=3){
glitch.play();
activate("intruder");
}
}
}
</script>

</body>
</html>
