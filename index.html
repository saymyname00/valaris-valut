<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velaris Vault</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Georgia, serif;
}

html,body{
  width:100%;
  height:100dvh;
  overflow:hidden;
  background:#0b0f18;
  color:white;
}

/* ================= CANVAS BACKGROUND ================= */

#particleCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
}

/* ================= CENTER LAYOUT ================= */

.center{
  position:relative;
  width:100vw;
  height:100dvh;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:2;
  transition:opacity 0.6s ease;
}

/* ================= GLASS CARD ================= */

.card{
  width:90%;
  max-width:420px;
  padding:45px 35px;
  border-radius:22px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(212,175,55,0.5);
  box-shadow:0 0 60px rgba(212,175,55,0.1);
  text-align:center;
  animation: floatCard 6s ease-in-out infinite;
}

@keyframes floatCard{
  0%{ transform: translateY(0px); }
  50%{ transform: translateY(-6px); }
  100%{ transform: translateY(0px); }
}

h1{
  margin-bottom:25px;
  font-size:clamp(20px,4vw,28px);
  color:#e0b45c;
  letter-spacing:2px;
}

/* ================= INPUT ================= */

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid rgba(224,180,92,0.7);
  background:transparent;
  color:white;
  outline:none;
  font-size:18px;
  letter-spacing:6px;
  text-align:center;
}

input:focus{
  box-shadow:0 0 14px rgba(224,180,92,0.5);
}

/* ================= BUTTON ================= */

button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#e0b45c;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

.error{
  margin-top:15px;
  font-size:14px;
  height:18px;
}

/* ================= SHAKE ================= */

@keyframes luxuryShake {
  0% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
  100% { transform: translateX(0); }
}

.shake {
  animation: luxuryShake 0.35s ease;
}

/* ================= INTRUDER ================= */

#intruder{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100dvh;
  background:url("baby.jpg") center center no-repeat;
  background-size:cover;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:3;
  filter: contrast(1.1) brightness(1.05);
}

#intruder::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

.intruder-text{
  position:relative;
  font-size:clamp(34px,7vw,72px);
  font-weight:900;
  letter-spacing:4px;
  color:#f2f4f8; /* cool platinum tone */
  text-transform:uppercase;
  text-shadow:
      0 0 6px rgba(255,255,255,0.5),
      0 0 18px rgba(180,200,255,0.25);
  animation: royalPulse 6s ease-in-out infinite;
}

@keyframes royalPulse{
  0%{ opacity:0.85; }
  50%{ opacity:1; }
  100%{ opacity:0.85; }
}

@keyframes glitchText{
  0%{ transform:translate(0); }
  20%{ transform:translate(-2px,2px); }
  40%{ transform:translate(2px,-2px); }
  60%{ transform:translate(-1px,1px); }
  80%{ transform:translate(1px,-1px); }
  100%{ transform:translate(0); }
}

/* ================= VAULT ================= */

#vault{
  display:none;
  opacity:0;
}

.message-card{
  width:90%;
  max-width:700px;
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(224,180,92,0.6);
  box-shadow:0 0 60px rgba(224,180,92,0.1);
  text-align:center;
}

/* ================= CUSTOM CURSOR ================= */

.custom-cursor, .cursor-ring{
  position:fixed;
  pointer-events:none;
  z-index:10;
  transform:translate(-50%, -50%);
}

.custom-cursor{
  width:8px;
  height:8px;
  background:#e0b45c;
  border-radius:50%;
  box-shadow:0 0 10px rgba(224,180,92,0.8);
}

.cursor-ring{
  width:28px;
  height:28px;
  border:1px solid rgba(224,180,92,0.4);
  border-radius:50%;
}

</style>
</head>

<body>

<canvas id="particleCanvas"></canvas>

<!-- LOCK -->
<div class="center" id="lock">
  <div class="card" id="card">
    <h1>PRIVATE ACCESS</h1>
    <input type="text" id="pass" placeholder="ENTER PASSWORD" autocomplete="off">
    <button onclick="check()">ENTER</button>
    <div class="error" id="err"></div>
  </div>
</div>

<!-- INTRUDER -->
<div id="intruder">
  <div class="intruder-text">
    THIS PAGE IS NOT FOR YOU
  </div>
</div>

<!-- VAULT -->
<div class="center" id="vault">
  <div class="message-card">
    <p id="vaultText"></p>
  </div>
</div>

<div class="custom-cursor"></div>
<div class="cursor-ring"></div>

<script>

/* ================= PARTICLES ================= */

const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

const particles = [];
const PARTICLE_COUNT = 55;

for(let i=0;i<PARTICLE_COUNT;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    size: Math.random()*2 + 0.5,
    speedX: (Math.random()-0.5)*0.2,
    speedY: (Math.random()-0.5)*0.2,
    opacity: Math.random()*0.5 + 0.2
  });
}

function animateParticles(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.speedX;
    p.y += p.speedY;

    if(p.x < 0 || p.x > canvas.width) p.speedX *= -1;
    if(p.y < 0 || p.y > canvas.height) p.speedY *= -1;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(224,180,92,${p.opacity})`;
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ================= CURSOR (DESKTOP ONLY) ================= */

if(window.matchMedia("(pointer: fine)").matches){
  document.body.style.cursor = "none";

  const cursor = document.querySelector(".custom-cursor");
  const ring = document.querySelector(".cursor-ring");

  let mouseX=0, mouseY=0;
  let ringX=0, ringY=0;

  document.addEventListener("mousemove", e=>{
    mouseX=e.clientX;
    mouseY=e.clientY;
    cursor.style.left = mouseX+"px";
    cursor.style.top = mouseY+"px";
  });

  function animateRing(){
    ringX += (mouseX-ringX)*0.1;
    ringY += (mouseY-ringY)*0.1;
    ring.style.left = ringX+"px";
    ring.style.top = ringY+"px";
    requestAnimationFrame(animateRing);
  }
  animateRing();
}else{
  document.querySelector(".custom-cursor").style.display="none";
  document.querySelector(".cursor-ring").style.display="none";
}

/* ================= PASSWORD SYSTEM ================= */

const correctPassword = "gutka";
let attempts = 0;
let realPassword = "";

const nooo = new Audio("nooo.mp3");
const yaya = new Audio("yaya.mp3");
const glitch = new Audio("glitch.mp3");
const ambient = new Audio("ambient.mp3");

ambient.loop = true;
ambient.volume = 0;

const passInput = document.getElementById("pass");

passInput.addEventListener("keydown", function(e){
  if(e.key === "Backspace"){
    realPassword = realPassword.slice(0,-1);
  } else if(e.key.length === 1){
    realPassword += e.key;
  }
});

passInput.addEventListener("input", function(){
  passInput.value = "•".repeat(realPassword.length);
});

function typeWriter(text){
  let i=0;
  const target=document.getElementById("vaultText");
  target.innerHTML="";
  function typing(){
    if(i<text.length){
      target.innerHTML+=text.charAt(i);
      i++;
      setTimeout(typing,30);
    }
  }
  typing();
}

function check(){
  const error=document.getElementById("err");
  const card=document.getElementById("card");

  if(realPassword===""){
    error.style.color="#e0b45c";
    error.innerText="Password required.";
    return;
  }

  if(realPassword===correctPassword){

    yaya.play();
    document.getElementById("lock").style.opacity="0";

    setTimeout(()=>{
      document.getElementById("lock").style.display="none";
      const vault=document.getElementById("vault");
      vault.style.display="flex";
      setTimeout(()=>vault.style.opacity="1",50);

      typeWriter("Pani lekar aa mere liye, glass me, 3 glass chaiye samjha kya");

      ambient.play();
      let fade=0;
      const fadeInt=setInterval(()=>{
        if(fade<0.15){
          fade+=0.01;
          ambient.volume=fade;
        }else clearInterval(fadeInt);
      },100);
    },600);

  } else {

    attempts++;
    card.classList.add("shake");
    setTimeout(()=>card.classList.remove("shake"),350);

    nooo.play();
    error.style.color="red";
    error.innerText="Access denied.";

    if(attempts>=3){
      glitch.play();
      document.getElementById("lock").style.display="none";
      document.getElementById("intruder").style.display="flex";
    }
  }
}

</script>
</body>
</html>
